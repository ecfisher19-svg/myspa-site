<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MySpa — Reset Password</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#c9a96e;--gold-dim:#c9a96e18;--gold-mid:#c9a96e40;
  --bg:#080807;--surface:#111110;--surface2:#191918;
  --border:#2a2928;--border2:#3a3836;
  --text:#f0ebe3;--text2:#9a9088;--text3:#524e48;
  --danger:#e05555;--success:#5db888;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.bg-lines{position:fixed;inset:0;z-index:0;pointer-events:none}
.bg-line{position:absolute;top:0;bottom:0;width:0.5px;background:linear-gradient(to bottom,transparent,rgba(201,169,110,0.06),transparent)}
.bg-line:nth-child(1){left:20%}.bg-line:nth-child(2){left:40%}
.bg-line:nth-child(3){left:60%}.bg-line:nth-child(4){left:80%}
.bg-glow{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:600px;background:radial-gradient(ellipse,rgba(201,169,110,0.05),transparent 70%);pointer-events:none;z-index:0}
.logo{position:fixed;top:24px;left:50%;transform:translateX(-50%);font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;color:var(--gold);letter-spacing:0.1em;text-decoration:none;z-index:10}
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:420px;position:relative;z-index:2}
.card-eyebrow{font-size:10px;color:var(--gold);letter-spacing:0.16em;text-transform:uppercase;margin-bottom:10px;text-align:center}
.card-title{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;color:var(--text);text-align:center;margin-bottom:8px}
.card-sub{font-size:13px;color:var(--text3);text-align:center;line-height:1.6;margin-bottom:28px}
.form-group{margin-bottom:16px}
.form-label{font-size:11px;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px;display:block}
.form-input{width:100%;background:var(--surface2);border:0.5px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s}
.form-input:focus{border-color:var(--gold-mid)}
.form-input::placeholder{color:var(--text3)}
.strength-bar{height:3px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden}
.strength-fill{height:100%;width:0%;border-radius:2px;transition:width 0.3s,background 0.3s}
.strength-label{font-size:10px;color:var(--text3);margin-top:4px;height:14px}
.submit-btn{width:100%;background:var(--gold);color:var(--bg);border:none;border-radius:10px;padding:14px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;transition:opacity 0.2s;margin-top:8px}
.submit-btn:hover{opacity:0.88}
.submit-btn:disabled{opacity:0.4;cursor:not-allowed}
.error-msg{background:#e0555522;border:0.5px solid #e0555544;border-radius:8px;padding:10px 14px;font-size:12px;color:var(--danger);margin-bottom:16px;display:none}
.success-state{display:none;text-align:center}
.success-icon{width:64px;height:64px;border-radius:50%;background:var(--gold-dim);border:0.5px solid var(--gold-mid);display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.success-icon svg{width:24px;height:24px;stroke:var(--gold);stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.check-path{stroke-dasharray:40;stroke-dashoffset:40;animation:drawCheck 0.4s 0.2s ease forwards}
@keyframes drawCheck{to{stroke-dashoffset:0}}
.back-link{text-align:center;margin-top:20px;font-size:12px;color:var(--text3)}
.back-link a{color:var(--gold);text-decoration:none}
</style>
</head>
<body>
<div class="bg-lines">
  <div class="bg-line"></div><div class="bg-line"></div>
  <div class="bg-line"></div><div class="bg-line"></div>
</div>
<div class="bg-glow"></div>
<a class="logo" href="/index.html">MySpa</a>

<div class="card">
  <div id="reset-form-view">
    <div class="card-eyebrow">Account Security</div>
    <h1 class="card-title">Set New Password</h1>
    <p class="card-sub">Choose a strong password for your MySpa account.</p>

    <div id="error-msg" class="error-msg"></div>

    <div class="form-group">
      <label class="form-label">New Password</label>
      <input class="form-input" type="password" id="new-password" placeholder="Min. 8 characters" oninput="checkStrength(this.value)"/>
      <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
      <div class="strength-label" id="strength-label"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Confirm Password</label>
      <input class="form-input" type="password" id="confirm-password" placeholder="Repeat your password"/>
    </div>
    <button class="submit-btn" id="reset-btn" onclick="resetPassword()">Update Password</button>
  </div>

  <div id="success-view" class="success-state">
    <div class="success-icon">
      <svg viewBox="0 0 24 24"><polyline class="check-path" points="4 12 9 17 20 7"/></svg>
    </div>
    <div class="card-eyebrow">All Done</div>
    <h2 style="font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:var(--text);margin-bottom:8px">Password Updated</h2>
    <p style="font-size:13px;color:var(--text3);line-height:1.6;margin-bottom:24px">Your password has been successfully updated. You can now sign in with your new password.</p>
    <a href="/auth.html" style="display:inline-block;background:var(--gold);color:var(--bg);text-decoration:none;padding:12px 28px;border-radius:24px;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:12px">Sign In →</a>
    <br/>
    <a href="/index.html" style="font-size:12px;color:var(--text3);text-decoration:none;letter-spacing:0.04em;transition:color 0.2s" onmouseover="this.style.color='var(--gold)'" onmouseout="this.style.color='var(--text3)'">← Back to MySpa Home</a>
  </div>

  <div class="back-link"><a href="/auth.html">← Back to Sign In</a></div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const SUPABASE_URL = 'https://nylbgdizzlpsaacrbsae.supabase.co';
const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_pmUom2TfYAl2oa3OrFXpSw_JVL4LE4P';
const supabase = createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

/* ── Handle reset token from URL ── */
const hashParams = new URLSearchParams(window.location.hash.replace('#',''));
const accessToken = hashParams.get('access_token');
const refreshToken = hashParams.get('refresh_token');
const type = hashParams.get('type');

if (accessToken && type === 'recovery') {
  await supabase.auth.setSession({ access_token: accessToken, refresh_token: refreshToken });
} else {
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) window.location.href = '/auth.html';
}

/* ── Password strength checker ── */
window.checkStrength = (pwd) => {
  const fill = document.getElementById('strength-fill');
  const label = document.getElementById('strength-label');
  let strength = 0;
  if (pwd.length >= 8) strength++;
  if (pwd.match(/[A-Z]/)) strength++;
  if (pwd.match(/[0-9]/)) strength++;
  if (pwd.match(/[^A-Za-z0-9]/)) strength++;
  const colors = ['#e05555','#e09055','#c9a96e','#5db888'];
  const labels = ['Weak','Fair','Good','Strong'];
  const widths = ['25%','50%','75%','100%'];
  if (pwd.length === 0) { fill.style.width = '0%'; label.textContent = ''; return; }
  fill.style.width = widths[strength-1] || '25%';
  fill.style.background = colors[strength-1] || '#e05555';
  label.textContent = labels[strength-1] || 'Weak';
  label.style.color = colors[strength-1] || '#e05555';
};

/* ── Reset password ── */
window.resetPassword = async () => {
  const newPwd = document.getElementById('new-password').value;
  const confirmPwd = document.getElementById('confirm-password').value;
  const btn = document.getElementById('reset-btn');
  const errorEl = document.getElementById('error-msg');

  if (newPwd.length < 8) { showError('Password must be at least 8 characters.'); return; }
  if (newPwd !== confirmPwd) { showError('Passwords do not match.'); return; }

  btn.disabled = true; btn.textContent = 'Updating...';

  const { error } = await supabase.auth.updateUser({ password: newPwd });

  if (error) {
    showError(error.message);
    btn.disabled = false; btn.textContent = 'Update Password';
  } else {
    document.getElementById('reset-form-view').style.display = 'none';
    document.getElementById('success-view').style.display = 'block';
  }
};

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg; el.style.display = 'block';
}
</script>
</body>
</html>
